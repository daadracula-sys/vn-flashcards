<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>越南語單字卡</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; width: 90%; max-width: 400px; height: 300px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; text-align: center; padding: 20px; position: relative; }
        .word { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .meaning { font-size: 1.5rem; color: #475569; display: none; }
        .example { font-size: 1rem; color: #64748b; margin-top: 15px; display: none; font-style: italic; }
        .controls { margin-top: 30px; display: flex; gap: 10px; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 1rem; cursor: pointer; }
        .tts-btn { background: #10b981; margin-top: 10px; padding: 8px 16px; font-size: 0.9rem; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card" id="flashcard" onclick="flipCard()">
        <div class="word" id="word-text">Cà phê sữa đá</div>
        <button class="tts-btn" onclick="event.stopPropagation(); speakText('word')">🔊 聽單字</button>
        
        <div class="meaning" id="meaning-text">冰煉乳咖啡</div>
        <div class="example" id="example-text">Tôi muốn một ly cà phê sữa đá.</div>
        <button id="ex-tts-btn" class="tts-btn" style="display:none;" onclick="event.stopPropagation(); speakText('example')">🔊 聽例句</button>
    </div>

    <div id="status">準備中...</div>

    <div class="controls">
        <button onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
    </div>

    <script>
        // 以下資料來自程式邏輯判斷：手動指定 Siri 聲音 4
        let cards = [
            { Word: "Cà phê sữa đá", Meaning: "冰煉乳咖啡", Example: "Tôi muốn một ly cà phê sữa đá." },
            { Word: "Phở bò", Meaning: "牛肉河粉", Example: "Phở bò ở đây rất ngon." }
        ];
        let currentIndex = 0;
        let isFlipped = false;

        // 核心功能：朗讀聲音鎖定
        function speakText(type) {
            const text = type === 'word' ? cards[currentIndex].Word : cards[currentIndex].Example;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';

            // 取得所有語音清單
            const voices = window.speechSynthesis.getVoices();
            
            // 關鍵邏輯：優先找尋名稱包含 "Siri" 且有 "4" 的聲音
            const targetVoice = voices.find(v => 
                v.lang.includes('vi') && 
                v.name.includes('Siri') && 
                v.name.includes('4')
            ) || voices.find(v => v.lang.includes('vi')); // 找不到就用隨機越南語

            if (targetVoice) {
                msg.voice = targetVoice;
                console.log("使用語音:", targetVoice.name);
            }

            window.speechSynthesis.speak(msg);
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('meaning-text').style.display = isFlipped ? 'block' : 'none';
            document.getElementById('example-text').style.display = isFlipped ? 'block' : 'none';
            document.getElementById('ex-tts-btn').style.display = isFlipped ? 'inline-block' : 'none';
        }

        function updateCard() {
            isFlipped = false;
            const card = cards[currentIndex];
            document.getElementById('word-text').innerText = card.Word;
            document.getElementById('meaning-text').innerText = card.Meaning;
            document.getElementById('example-text').innerText = card.Example;
            
            // 隱藏背面資訊
            document.getElementById('meaning-text').style.display = 'none';
            document.getElementById('example-text').style.display = 'none';
            document.getElementById('ex-tts-btn').style.display = 'none';
            
            document.getElementById('status').innerText = `目前進度: ${currentIndex + 1} / ${cards.length}`;
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // 初始化語音（部分瀏覽器需要預熱）
        window.speechSynthesis.getVoices();
        updateCard();
    </script>
</body>
</html>
