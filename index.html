<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>越南語行動單字卡 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
        /* 隱藏捲軸但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased selection:bg-emerald-200">

    <div class="w-full max-w-xl mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
        <!-- 頂部標題 -->
        <header class="bg-emerald-600 text-white p-5 pb-4 shadow-md z-10">
            <h1 class="text-2xl font-bold mb-1"><i class="fas fa-language mr-2"></i>越南語行動單字卡</h1>
            <p class="text-emerald-100 text-sm">您的專屬 AI 記憶教練</p>
        </header>

        <!-- 導覽列 -->
        <nav class="flex border-b border-gray-200 bg-white sticky top-0 z-10">
            <button id="tab-study" class="flex-1 py-3 text-center font-bold text-emerald-600 border-b-2 border-emerald-600 transition-colors">
                <i class="fas fa-layer-group mr-1"></i> 複習
            </button>
            <button id="tab-manage" class="flex-1 py-3 text-center font-bold text-gray-500 border-b-2 border-transparent hover:text-emerald-500 transition-colors">
                <i class="fas fa-cog mr-1"></i> 管理單字
            </button>
        </nav>

        <!-- 主要內容區 -->
        <div class="flex-1 p-5 flex flex-col overflow-y-auto no-scrollbar relative">
            
            <!-- ================= [學習與複習視圖] ================= -->
            <div id="view-study" class="flex flex-col flex-1">
                
                <!-- 個人化貼心提示 -->
                <div class="mb-5 bg-emerald-50 text-emerald-800 text-sm p-4 rounded-xl border border-emerald-200 flex gap-3 shadow-sm">
                    <div class="mt-0.5 text-emerald-500"><i class="fas fa-map-marker-alt text-lg"></i></div>
                    <div>
                        <p class="font-bold mb-1">👋 來自台北/基隆的學習者您好！</p>
                        <p>為達最佳學習效果，使用發音功能前，請確認您的設備語音引擎 (TTS) 已設定為<strong>「南越（胡志明市）口音」</strong>喔！</p>
                    </div>
                </div>

                <!-- 進度條 -->
                <div id="progress-container" class="mb-6 hidden">
                    <div class="flex justify-between text-sm text-gray-500 mb-2 font-medium">
                        <span>今日複習進度</span>
                        <span id="progress-text">0 / 0 已複習</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div id="progress-fill" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>

                <!-- 卡片容器 -->
                <div id="flashcard-container" class="flex-1 flex flex-col hidden">
                    <div id="flashcard" class="relative w-full flex-1 min-h-[350px] bg-white rounded-2xl shadow-lg border border-gray-100 cursor-pointer flex flex-col p-6 transition-transform duration-200 active:scale-[0.98] no-select">
                        
                        <!-- 語音按鈕 (共用) -->
                        <button id="tts-btn" class="absolute top-4 right-4 p-3 text-gray-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-full transition-colors z-20 focus:outline-none">
                            <i class="fas fa-volume-up text-xl"></i>
                        </button>

                        <!-- 卡片正面 (題目) -->
                        <div id="card-front" class="flex-1 flex flex-col items-center justify-center w-full">
                            <h2 class="text-4xl sm:text-5xl font-bold text-gray-800 mb-4 text-center break-words w-full" id="card-word"></h2>
                            <p class="text-xl text-gray-400 font-medium tracking-wide" id="card-pron"></p>
                            <div class="absolute bottom-6 flex items-center text-gray-300 text-sm animate-pulse">
                                <i class="fas fa-hand-pointer mr-2"></i> 點擊卡片看答案
                            </div>
                        </div>

                        <!-- 卡片背面 (解答) -->
                        <div id="card-back" class="hidden flex-1 flex flex-col w-full h-full justify-between">
                            <div class="pt-2">
                                <h3 class="text-xl font-bold text-gray-500 mb-1" id="card-word-back"></h3>
                                <p class="text-gray-400 text-sm mb-4" id="card-pron-back"></p>
                            </div>
                            
                            <div class="flex-1 flex flex-col justify-center">
                                <h2 class="text-3xl sm:text-4xl font-bold text-emerald-700 mb-4 text-center break-words" id="card-meaning"></h2>
                                <p class="text-gray-600 text-center italic text-lg leading-relaxed px-2" id="card-example"></p>
                            </div>

                            <div class="flex justify-center gap-2 mt-6 pb-2">
                                <span class="px-3 py-1 bg-gray-100 text-xs text-gray-500 rounded-lg font-medium" id="card-cat"></span>
                                <span class="px-3 py-1 bg-emerald-50 text-xs text-emerald-600 rounded-lg font-bold" id="card-level"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Anki 操作按鈕 (翻面後顯示) -->
                    <div id="action-buttons" class="hidden w-full grid grid-cols-4 gap-2 sm:gap-3 mt-5 no-select">
                        <button onclick="answerCard(0)" class="flex flex-col items-center justify-center py-3 bg-red-50 text-red-700 rounded-xl hover:bg-red-100 transition active:bg-red-200">
                            <span class="font-bold text-base sm:text-lg mb-0.5">Again</span>
                            <span class="text-xs opacity-70 font-medium" id="lbl-again">1m</span>
                        </button>
                        <button onclick="answerCard(1)" class="flex flex-col items-center justify-center py-3 bg-orange-50 text-orange-700 rounded-xl hover:bg-orange-100 transition active:bg-orange-200">
                            <span class="font-bold text-base sm:text-lg mb-0.5">Hard</span>
                            <span class="text-xs opacity-70 font-medium" id="lbl-hard">6m</span>
                        </button>
                        <button onclick="answerCard(2)" class="flex flex-col items-center justify-center py-3 bg-blue-50 text-blue-700 rounded-xl hover:bg-blue-100 transition active:bg-blue-200">
                            <span class="font-bold text-base sm:text-lg mb-0.5">Good</span>
                            <span class="text-xs opacity-70 font-medium" id="lbl-good">10m</span>
                        </button>
                        <button onclick="answerCard(3)" class="flex flex-col items-center justify-center py-3 bg-green-50 text-green-700 rounded-xl hover:bg-green-100 transition active:bg-green-200">
                            <span class="font-bold text-base sm:text-lg mb-0.5">Easy</span>
                            <span class="text-xs opacity-70 font-medium" id="lbl-easy">4d</span>
                        </button>
                    </div>
                </div>

                <!-- 學習完成視圖 -->
                <div id="done-view" class="hidden flex-1 flex flex-col items-center justify-center text-center py-10">
                    <div class="w-24 h-24 bg-emerald-50 border-4 border-emerald-100 text-emerald-500 rounded-full flex items-center justify-center text-4xl mb-6 shadow-sm">
                        🎉
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-3">太棒了！</h2>
                    <p class="text-gray-500 mb-8 px-4 leading-relaxed" id="done-message">目前沒有需要複習的單字囉。</p>
                    <button onclick="initStudySession()" class="px-8 py-3.5 bg-emerald-600 text-white font-bold rounded-full shadow-lg hover:bg-emerald-700 hover:shadow-xl transition transform active:scale-95">
                        <i class="fas fa-sync-alt mr-2"></i>重新檢查
                    </button>
                </div>
            </div>

            <!-- ================= [管理單字視圖] ================= -->
            <div id="view-manage" class="hidden flex-1 flex flex-col pb-6">
                <!-- CSV 匯入區塊 -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                    <h3 class="font-bold text-gray-800 mb-2"><i class="fas fa-file-csv text-emerald-600 mr-2"></i>批次匯入 CSV</h3>
                    <p class="text-xs text-gray-500 mb-4 leading-relaxed">
                        欄位順序：Word(越文), Meaning(中文), 例句, 發音標記, 類別, 難度。<br>
                        首行標題會自動忽略。
                    </p>
                    <label class="w-full flex items-center justify-center px-4 py-3 bg-emerald-50 text-emerald-700 rounded-xl border border-emerald-200 border-dashed cursor-pointer hover:bg-emerald-100 transition">
                        <i class="fas fa-cloud-upload-alt mr-2 text-lg"></i>
                        <span class="font-medium">選擇 CSV 檔案</span>
                        <input type="file" id="csv-upload" accept=".csv" class="hidden">
                    </label>
                </div>

                <!-- 手動新增單字 -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                    <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-plus-circle text-emerald-600 mr-2"></i>新增單字</h3>
                    <form id="form-add" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="add-word" placeholder="*越南文 (Word)" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition" required>
                            <input type="text" id="add-meaning" placeholder="*中文意思 (Meaning)" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition" required>
                        </div>
                        <input type="text" id="add-example" placeholder="例句 (Example)" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" id="add-pron" placeholder="發音標記" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition text-sm">
                            <input type="text" id="add-category" placeholder="類別" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition text-sm">
                            <input type="text" id="add-level" placeholder="難度" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition text-sm">
                        </div>
                        <button type="submit" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl shadow hover:bg-emerald-700 transition active:scale-[0.98] mt-2">
                            新增至牌組
                        </button>
                    </form>
                </div>

                <!-- 單字列表 -->
                <div>
                    <div class="flex justify-between items-center mb-4 px-1">
                        <h3 class="font-bold text-gray-800"><i class="fas fa-list text-emerald-600 mr-2"></i>單字庫列表</h3>
                        <span class="text-sm text-gray-500 bg-gray-200 px-3 py-1 rounded-full"><span id="total-word-count">0</span> 個單字</span>
                    </div>
                    <div id="word-list" class="space-y-3">
                        <!-- 動態插入單字列表 -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 腳本邏輯 -->
    <script>
        const STORAGE_KEY = 'vn_flashcards_deck';
        let deck = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let dueCards = [];
        let currentCard = null;
        let isFlipped = false;
        
        // 進度變數
        let sessionTotalDue = 0;
        let sessionStudied = 0;

        // 初始化預設資料 (若為首次使用)
        if (deck.length === 0) {
            deck = [
                { id: 1, word: 'Xin chào', meaning: '你好', example: 'Xin chào, bạn khỏe không?', pronunciation: 'sin tɕàw', category: '基本問候', level: 'A1', reps: 0, interval: 0, ease: 2.5, nextReview: 0 },
                { id: 2, word: 'Cảm ơn', meaning: '謝謝', example: 'Cảm ơn bạn rất nhiều.', pronunciation: 'kảːm ɜn', category: '基本問候', level: 'A1', reps: 0, interval: 0, ease: 2.5, nextReview: 0 },
                { id: 3, word: 'Tạm biệt', meaning: '再見', example: 'Tạm biệt, hẹn gặp lại!', pronunciation: 'tạːm ɓiệt', category: '基本問候', level: 'A1', reps: 0, interval: 0, ease: 2.5, nextReview: 0 }
            ];
            saveDeck();
        }

        // ================= 工具與狀態管理 =================
        function saveDeck() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(deck));
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl transition-opacity duration-300 z-50 font-medium text-sm text-center w-max max-w-[90%]';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ================= 語音合成 (TTS) =================
        function playVoice(text) {
            if (!('speechSynthesis' in window)) {
                showToast("您的設備不支援語音合成功能");
                return;
            }
            // 中止前一次發音
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN'; 
            utterance.rate = 0.9; // 稍微放慢一點點方便學習
            window.speechSynthesis.speak(utterance);
        }

        // ================= UI 事件綁定 =================
        document.addEventListener("DOMContentLoaded", () => {
            // Tab 切換
            document.getElementById('tab-study').addEventListener('click', () => switchTab('study'));
            document.getElementById('tab-manage').addEventListener('click', () => switchTab('manage'));

            // 卡片翻面
            document.getElementById('flashcard').addEventListener('click', () => {
                if (!isFlipped && currentCard) {
                    isFlipped = true;
                    document.getElementById('card-front').classList.add('hidden');
                    document.getElementById('card-back').classList.remove('hidden');
                    document.getElementById('action-buttons').classList.remove('hidden');
                }
            });

            // TTS 按鈕 (避免點擊時觸發卡片翻面)
            document.getElementById('tts-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentCard) playVoice(currentCard.word);
            });

            // 初始化應用程式
            switchTab('study');
        });

        function switchTab(tab) {
            const studyTab = document.getElementById('tab-study');
            const manageTab = document.getElementById('tab-manage');
            
            if (tab === 'study') {
                document.getElementById('view-study').classList.remove('hidden');
                document.getElementById('view-manage').classList.add('hidden');
                
                studyTab.className = "flex-1 py-3 text-center font-bold text-emerald-600 border-b-2 border-emerald-600 transition-colors";
                manageTab.className = "flex-1 py-3 text-center font-bold text-gray-400 border-b-2 border-transparent hover:text-emerald-500 transition-colors";
                
                initStudySession();
            } else {
                document.getElementById('view-study').classList.add('hidden');
                document.getElementById('view-manage').classList.remove('hidden');
                
                manageTab.className = "flex-1 py-3 text-center font-bold text-emerald-600 border-b-2 border-emerald-600 transition-colors";
                studyTab.className = "flex-1 py-3 text-center font-bold text-gray-400 border-b-2 border-transparent hover:text-emerald-500 transition-colors";
                
                renderManageList();
            }
        }

        // ================= Anki 演算法與學習邏輯 =================
        window.initStudySession = function() {
            const now = Date.now();
            // 過濾出目前需要複習的卡片 (nextReview 在過去或沒有設定的)
            dueCards = deck.filter(c => !c.nextReview || c.nextReview <= now);
            dueCards.sort((a, b) => (a.nextReview || 0) - (b.nextReview || 0));

            sessionTotalDue = dueCards.length;
            sessionStudied = 0;

            loadNextCard();
        };

        function loadNextCard() {
            isFlipped = false;
            const now = Date.now();
            
            // 重新整理序列
            dueCards = deck.filter(c => !c.nextReview || c.nextReview <= now);
            dueCards.sort((a, b) => (a.nextReview || 0) - (b.nextReview || 0));

            if (dueCards.length > 0) {
                currentCard = dueCards[0];
                renderStudyCard();
            } else {
                currentCard = null;
                renderDoneView();
            }
            updateProgress();
        }

        function renderStudyCard() {
            document.getElementById('flashcard-container').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('done-view').classList.add('hidden');
            
            // UI 重置至正面
            document.getElementById('card-front').classList.remove('hidden');
            document.getElementById('card-back').classList.add('hidden');
            document.getElementById('action-buttons').classList.add('hidden');

            // 填入資料
            document.getElementById('card-word').innerText = currentCard.word;
            document.getElementById('card-pron').innerText = currentCard.pronunciation ? `/${currentCard.pronunciation}/` : '';
            
            document.getElementById('card-word-back').innerText = currentCard.word;
            document.getElementById('card-pron-back').innerText = currentCard.pronunciation ? `/${currentCard.pronunciation}/` : '';
            document.getElementById('card-meaning').innerText = currentCard.meaning;
            document.getElementById('card-example').innerText = currentCard.example || '無例句';
            
            document.getElementById('card-cat').innerText = currentCard.category || '未分類';
            document.getElementById('card-level').innerText = currentCard.level || '無';

            // 計算預估時間並顯示在按鈕上
            calculateAnkiIntervals();
        }

        function calculateAnkiIntervals() {
            let ease = currentCard.ease || 2.5;
            let interval = currentCard.interval || 0;
            let reps = currentCard.reps || 0;

            let intAgain = 1 / 1440; // 1 分鐘
            let intHard = reps === 0 ? 6 / 1440 : Math.max(1/1440, interval * 1.2);
            let intGood = reps === 0 ? 10 / 1440 : interval * ease;
            let intEasy = reps === 0 ? 4 : interval * ease * 1.3;

            document.getElementById('lbl-again').innerText = formatInterval(intAgain);
            document.getElementById('lbl-hard').innerText = formatInterval(intHard);
            document.getElementById('lbl-good').innerText = formatInterval(intGood);
            document.getElementById('lbl-easy').innerText = formatInterval(intEasy);
        }

        function formatInterval(days) {
            if (days < 1) {
                const mins = Math.round(days * 1440);
                if (mins < 60) return mins + "m";
                return Math.round(mins / 60) + "h";
            }
            const d = Math.round(days * 10) / 10;
            if (d >= 30) return Math.round(d/30) + "mo";
            return d + "d";
        }

        // 處理使用者的按鈕選擇
        window.answerCard = function(quality) {
            if (!currentCard || !isFlipped) return;

            let ease = currentCard.ease || 2.5;
            let interval = currentCard.interval || 0;
            let reps = currentCard.reps || 0;

            if (quality === 0) { // Again (記不住，插隊)
                reps = 0;
                interval = 1 / 1440; // 1 min
                ease = Math.max(1.3, ease - 0.2);
                currentCard.nextReview = Date.now() + 1000; // 1秒後馬上又出現 (或排入今日稍後)
            } else if (quality === 1) { // Hard
                if (reps === 0) interval = 6 / 1440; // 6 mins
                else interval = Math.max(1 / 1440, interval * 1.2);
                ease = Math.max(1.3, ease - 0.15);
                currentCard.nextReview = Date.now() + interval * 24 * 60 * 60 * 1000;
            } else if (quality === 2) { // Good
                if (reps === 0) interval = 10 / 1440; // 10 mins
                else interval = interval * ease;
                reps += 1;
                currentCard.nextReview = Date.now() + interval * 24 * 60 * 60 * 1000;
            } else if (quality === 3) { // Easy
                if (reps === 0) interval = 4; // 4 days
                else interval = interval * ease * 1.3;
                ease += 0.15;
                reps += 1;
                currentCard.nextReview = Date.now() + interval * 24 * 60 * 60 * 1000;
            }

            currentCard.reps = reps;
            currentCard.interval = interval;
            currentCard.ease = ease;

            saveDeck();

            // 若卡片已推遲到較長時間之後 (例如 > 1分鐘)，視為已完成一次有效複習
            if (quality > 0 && currentCard.nextReview > Date.now() + 60000) {
                sessionStudied++;
            }

            // 準備載入下一張
            loadNextCard();
        };

        function updateProgress() {
            let progress = 0;
            if (sessionTotalDue > 0) {
                progress = (sessionStudied / sessionTotalDue) * 100;
                if (progress > 100) progress = 100;
            }
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${sessionStudied} / ${sessionTotalDue} 已複習`;
        }

        function renderDoneView() {
            document.getElementById('flashcard-container').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('done-view').classList.remove('hidden');

            const upcoming = deck.filter(c => c.nextReview > Date.now() && c.nextReview < Date.now() + 24 * 3600 * 1000);
            if (upcoming.length > 0) {
                upcoming.sort((a,b) => a.nextReview - b.nextReview);
                const nextTime = new Date(upcoming[0].nextReview).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('done-message').innerText = `這個階段做得很好！下一個單字將在 ${nextTime} 進入序列。`;
            } else {
                document.getElementById('done-message').innerText = `今日的學習任務已全數達標！讓大腦休息一下吧。`;
            }
        }

        // ================= CSV 與資料庫管理 =================
        // CSV 匯入處理
        document.getElementById('csv-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                // 移除 BOM 字元並解析
                const text = event.target.result.replace(/^\uFEFF/, '');
                processCSV(text);
                e.target.value = ''; // Reset
            };
            reader.readAsText(file);
        });

        function processCSV(text) {
            const lines = text.split(/\r?\n/);
            let addedCount = 0;
            for (let i = 1; i < lines.length; i++) { // 從 1 開始跳過標題
                if (!lines[i].trim()) continue;
                
                // 簡易但強健的 CSV Parser (處理引號內的逗號)
                const arr = [];
                let quote = false, col = "";
                for (let j = 0; j < lines[i].length; j++) {
                    let cc = lines[i][j], nc = lines[i][j+1];
                    if (cc === '"' && quote && nc === '"') { col += cc; ++j; continue; }
                    if (cc === '"') { quote = !quote; continue; }
                    if (cc === ',' && !quote) { arr.push(col.trim()); col = ""; continue; }
                    col += cc;
                }
                arr.push(col.trim());

                if (arr.length >= 2 && arr[0]) {
                    deck.push({
                        id: Date.now() + addedCount,
                        word: arr[0],
                        meaning: arr[1],
                        example: arr[2] || '',
                        pronunciation: arr[3] || '',
                        category: arr[4] || '',
                        level: arr[5] || '',
                        reps: 0, interval: 0, ease: 2.5, nextReview: 0
                    });
                    addedCount++;
                }
            }
            saveDeck();
            showToast(`成功匯入 ${addedCount} 個單字！`);
            renderManageList();
        }

        // 手動新增單字
        document.getElementById('form-add').addEventListener('submit', (e) => {
            e.preventDefault();
            const newCard = {
                id: Date.now(),
                word: document.getElementById('add-word').value.trim(),
                meaning: document.getElementById('add-meaning').value.trim(),
                example: document.getElementById('add-example').value.trim(),
                pronunciation: document.getElementById('add-pron').value.trim(),
                category: document.getElementById('add-category').value.trim(),
                level: document.getElementById('add-level').value.trim(),
                reps: 0, interval: 0, ease: 2.5, nextReview: 0
            };
            
            deck.push(newCard);
            saveDeck();
            e.target.reset();
            showToast(`已新增：${newCard.word}`);
            renderManageList();
        });

        // 渲染單字列表
        window.renderManageList = function() {
            document.getElementById('total-word-count').innerText = deck.length;
            const listHtml = deck.map(c => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100 hover:border-emerald-200 transition-colors">
                    <div class="overflow-hidden">
                        <p class="font-bold text-gray-800 text-lg truncate">${c.word}</p>
                        <p class="text-sm text-gray-500 truncate mt-0.5">${c.meaning}</p>
                        ${c.nextReview > Date.now() ? `<span class="text-xs text-blue-500 mt-1 inline-block">排程：${new Date(c.nextReview).toLocaleDateString()}</span>` : '<span class="text-xs text-orange-500 mt-1 inline-block">待複習</span>'}
                    </div>
                    <button onclick="deleteCard(${c.id})" class="text-red-300 hover:text-red-500 p-3 ml-2 focus:outline-none transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).reverse().join(''); // 最新的在上面
            
            document.getElementById('word-list').innerHTML = listHtml || `
                <div class="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <p class="text-gray-400">目前還沒有單字，趕快匯入或新增吧！</p>
                </div>`;
        };

        window.deleteCard = function(id) {
            deck = deck.filter(c => c.id !== id);
            saveDeck();
            renderManageList();
            showToast("單字已移除");
        };
    </script>
</body>
</html>
